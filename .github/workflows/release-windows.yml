name: Release Windows

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Version a empaqueter, sans prefixe v"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/v*") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } elseif ("${{ github.event_name }}" -eq "release") {
            $version = "${{ github.event.release.tag_name }}".TrimStart("v")
          } else {
            $version = "${{ inputs.version }}".TrimStart("v")
          }
          if (-not ($version -match '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$')) {
            throw "Version invalide: $version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          Set-Content -Path VERSION -Value $version -Encoding ASCII

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Validate runtime
        shell: pwsh
        run: |
          $files = @("main.py") + (Get-ChildItem src,tests -Recurse -Filter *.py | ForEach-Object { $_.FullName })
          python -m py_compile @files
          python tests\smoke_checks.py
          python tests\core_helper_checks.py
          python main.py --version
          python main.py --sources
          python main.py --diagnose

      - name: Build executable
        shell: pwsh
        env:
          ROM_DOWNLOADER_VERSION: ${{ steps.version.outputs.version }}
        run: |
          pyinstaller --noconfirm --clean ROMDownloader.spec

      - name: Validate executable
        shell: pwsh
        run: |
          dist\ROMDownloader.exe --version
          dist\ROMDownloader.exe --sources
          $diagnose = dist\ROMDownloader.exe --diagnose
          $diagnose | Set-Content ROMDownloader.diagnose.txt -Encoding UTF8
          $diagnose
          $diagnoseText = $diagnose -join "`n"
          if ($diagnoseText -match 'Racine app: .*_MEI') {
            throw "L'exe portable ecrit son etat dans le dossier temporaire PyInstaller."
          }
          foreach ($dependency in @('py7zr', 'rarfile', 'tkinterdnd2')) {
            if ($diagnoseText -notmatch "  - $dependency`: ok") {
              throw "Dependance absente dans l'exe portable: $dependency"
            }
          }

      - name: Generate SHA-256 checksum
        id: checksum
        shell: pwsh
        run: |
          $exe = "dist\ROMDownloader.exe"
          Get-FileHash $exe -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash)  ROMDownloader.exe" | Set-Content "ROMDownloader.exe.sha256" -Encoding ASCII
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ROMDownloader-windows-${{ steps.version.outputs.version }}
          path: |
            dist/ROMDownloader.exe
            ROMDownloader.exe.sha256
            ROMDownloader.diagnose.txt

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $notes = @"
          ROM Downloader $tag

          Portable Windows executable:

          - ROMDownloader.exe
          - ROMDownloader.exe.sha256

          Installation rapide:

          Telecharger ROMDownloader.exe et executer directement.
          "@
          $args = @(
            "release", "create", $tag,
            "dist\ROMDownloader.exe", "ROMDownloader.exe.sha256",
            "--title", "ROM Downloader $tag",
            "--notes", $notes
          )
          gh @args

      - name: Attach assets to existing GitHub Release
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          gh release upload $tag dist\ROMDownloader.exe ROMDownloader.exe.sha256 --clobber
