name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version a empaqueter, sans prefixe v"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/v*") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "${{ inputs.version }}".TrimStart("v")
          }
          if (-not ($version -match '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$')) {
            throw "Version invalide: $version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          Set-Content -Path VERSION -Value $version -Encoding ASCII

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Validate runtime
        shell: pwsh
        run: |
          $files = @("main.py") + (Get-ChildItem src,tests -Recurse -Filter *.py | ForEach-Object { $_.FullName })
          python -m py_compile @files
          python tests\smoke_checks.py
          python tests\core_helper_checks.py
          python main.py --version
          python main.py --sources

      - name: Build executable
        shell: pwsh
        env:
          ROM_DOWNLOADER_VERSION: ${{ steps.version.outputs.version }}
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --name ROMDownloader `
            --onefile `
            --add-data "assets;assets" `
            --add-data "dat;dat" `
            --add-data "db;db" `
            --add-data "VERSION;." `
            main.py

      - name: Build release archive
        id: archive
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $stage = "release\ROMDownloader"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item dist\ROMDownloader.exe $stage\
          Copy-Item VERSION $stage\
          Copy-Item README.md $stage\
          Copy-Item PACKAGING_WINDOWS.md $stage\
          Copy-Item .env.example $stage\
          Copy-Item install.ps1 $stage\
          $archive = "ROMDownloader-windows-$version.zip"
          if (Test-Path $archive) { Remove-Item $archive -Force }
          Compress-Archive -Path "$stage\*" -DestinationPath $archive -CompressionLevel Optimal
          Get-FileHash $archive -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash)  $archive" | Set-Content "$archive.sha256" -Encoding ASCII
          }
          "archive=$archive" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ROMDownloader-windows-${{ steps.version.outputs.version }}
          path: |
            ${{ steps.archive.outputs.archive }}
            ${{ steps.archive.outputs.archive }}.sha256

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $archive = "${{ steps.archive.outputs.archive }}"
          $notes = @"
          ROM Downloader $tag

          Installation Windows:

          ````powershell
          irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
          ````

          Archive portable:
          - $archive
          - $archive.sha256
          "@
          $args = @(
            "release", "create", $tag, $archive, "$archive.sha256",
            "--title", "ROM Downloader $tag",
            "--notes", $notes
          )
          gh @args
