name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile Python
        shell: pwsh
        run: |
          $files = @("main.py") + (Get-ChildItem src,tests -Recurse -Filter *.py | ForEach-Object { $_.FullName })
          python -m py_compile @files
      - name: Runtime smoke checks
        run: python tests\smoke_checks.py
      - name: Core helper checks
        run: python tests\core_helper_checks.py
      - name: Version command
        run: python main.py --version
      - name: Local diagnostics
        run: python main.py --diagnose

  portable-exe:
    runs-on: windows-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6,<7"
      - name: Build portable executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean ROMDownloader.spec
      - name: Validate portable executable
        shell: pwsh
        run: |
          dist\ROMDownloader.exe --version
          dist\ROMDownloader.exe --sources
          $diagnose = dist\ROMDownloader.exe --diagnose
          $diagnose | Set-Content ROMDownloader.diagnose.txt -Encoding UTF8
          $diagnose
          $diagnoseText = $diagnose -join "`n"
          if ($diagnoseText -match 'Racine app: .*_MEI') {
            throw "L'exe portable ecrit son etat dans le dossier temporaire PyInstaller."
          }
          foreach ($dependency in @('py7zr', 'rarfile', 'tkinterdnd2')) {
            if ($diagnoseText -notmatch "  - $dependency`: ok") {
              throw "Dependance absente dans l'exe portable: $dependency"
            }
          }
      - name: Generate checksum
        shell: pwsh
        run: |
          Get-FileHash dist\ROMDownloader.exe -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash)  ROMDownloader.exe" | Set-Content ROMDownloader.exe.sha256 -Encoding ASCII
          }
      - name: Upload portable executable
        uses: actions/upload-artifact@v7
        with:
          name: ROMDownloader-portable-windows-${{ github.sha }}
          path: |
            dist/ROMDownloader.exe
            ROMDownloader.exe.sha256
            ROMDownloader.diagnose.txt
