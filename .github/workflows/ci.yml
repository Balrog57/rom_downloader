name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile Python
        shell: pwsh
        run: |
          $files = @("main.py") + (Get-ChildItem src,tests -Recurse -Filter *.py | ForEach-Object { $_.FullName })
          python -m py_compile @files
      - name: Runtime smoke checks
        run: python tests\smoke_checks.py
      - name: Core helper checks
        run: python tests\core_helper_checks.py
      - name: Version command
        run: python main.py --version
      - name: Obsolete reference guard
        shell: pwsh
        run: |
          $patterns = @(
            ('rom_downloader' + '\.py'),
            ('dat' + '\.exemple'),
            ('rom_db' + '_shards'),
            ('minerva_torrent' + '_download\.js')
          )
          $files = Get-ChildItem -File -Recurse -Force | Where-Object {
            $_.FullName -notmatch '\\.git\\' -and
            $_.FullName -notmatch '\\dat\\' -and
            $_.FullName -notmatch '\\db\\'
          }
          $matches = $files | Select-String -Pattern $patterns -ErrorAction SilentlyContinue
          if ($matches) {
            $matches | ForEach-Object { "$($_.Path):$($_.LineNumber):$($_.Line)" }
            exit 1
          }
